<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #fff;
    }

    #app {
        width: 720px;
        height: 85vh;
        background: #111827;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        overflow: hidden;
    }

    #header {
        padding: 15px;
        background: #1f2937;
        font-weight: bold;
        text-align: center;
    }

    #chat {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
    }

    .msg {
        margin: 10px 0;
        display: flex;
    }

    .bubble {
        padding: 10px 14px;
        border-radius: 12px;
        max-width: 75%;
        line-height: 1.4;
        white-space: pre-wrap;
    }

    .user {
        justify-content: flex-end;
    }

    .user .bubble {
        background: #3b82f6;
        color: white;
    }

    .ai {
        justify-content: flex-start;
    }

    .ai .bubble {
        background: #374151;
    }

    #inputBox {
        display: flex;
        padding: 10px;
        background: #1f2937;
    }

    input {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        outline: none;
        background: #111827;
        color: white;
    }

    button {
        margin-left: 10px;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #2563eb;
    }

    .typing {
        display: inline-block;
        font-size: 14px;
        color: #9ca3af;
    }

    .dot {
        animation: blink 1.4s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
        0% { opacity: 0.2; }
        20% { opacity: 1; }
        100% { opacity: 0.2; }
    }
</style>
</head>

<body>
<div id="app">
    <div id="header">🤖 AI Chat</div>

    <div id="chat"></div>

    <div id="inputBox">
        <input id="input" placeholder="输入内容，回车发送..." />
        <button onclick="send()">发送</button>
    </div>
</div>

<script>
const API_KEY = "tp-s57yofihpkq1ddnmbf8qb7uv5gvx0ta1lk9nuf9owylpqmab";
const BASE_URL = "https://token-plan-sgp.xiaomimimo.com/v1";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

function addMsg(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;

    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    return bubble;
}

function showTyping() {
    const div = document.createElement("div");
    div.className = "msg ai";
    div.id = "typing";

    const bubble = document.createElement("div");
    bubble.className = "bubble typing";
    bubble.innerHTML = `AI 思考中 <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>`;

    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
}

async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    showTyping();

    try {
        const res = await fetch(BASE_URL + "/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: "mimo-v2-pro",
                messages: [
                    { role: "user", content: text }
                ]
            })
        });

        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || "无返回内容";

        removeTyping();
        addMsg(reply, "ai");

    } catch (e) {
        removeTyping();
        addMsg("请求失败：" + e, "ai");
    }
}
</script>
</body>
</html>
